name: Update Changelog

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  update-changelog:
    name: Update CHANGELOG.md
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine Change Type
        id: change_type
        run: |
          PR_BODY="${{ github.event.pull_request.body }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PR_TITLE="${{ github.event.pull_request.title }}"
          MERGE_DATE=$(date -u +"%Y-%m-%d")

          TITLE_LOWER=$(echo "$PR_TITLE" | tr '[:upper:]' '[:lower:]')
          BODY_LOWER=$(echo "$PR_BODY" | tr '[:upper:]' '[:lower:]')

          if echo "$TITLE_LOWER$BODY_LOWER" | grep -qi "bug fix\|bugfix\|fix\|hotfix"; then
            SECTION="Fixed"
          elif echo "$TITLE_LOWER$BODY_LOWER" | grep -qi "breaking change\|breaking"; then
            SECTION="Changed"
          elif echo "$TITLE_LOWER$BODY_LOWER" | grep -qi "deprecat"; then
            SECTION="Deprecated"
          elif echo "$TITLE_LOWER$BODY_LOWER" | grep -qi "security\|vuln"; then
            SECTION="Security"
          elif echo "$TITLE_LOWER$BODY_LOWER" | grep -qi "doc\|readme"; then
            SECTION="Documentation"
          elif echo "$TITLE_LOWER$BODY_LOWER" | grep -qi "refactor\|clean"; then
            SECTION="Changed"
          elif echo "$TITLE_LOWER$BODY_LOWER" | grep -qi "perf\|optim"; then
            SECTION="Performance"
          else
            SECTION="Added"
          fi

          echo "section=$SECTION" >> "$GITHUB_OUTPUT"
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "pr_title=$PR_TITLE" >> "$GITHUB_OUTPUT"
          echo "merge_date=$MERGE_DATE" >> "$GITHUB_OUTPUT"

      - name: Update CHANGELOG.md
        run: |
          SECTION="${{ steps.change_type.outputs.section }}"
          PR_NUMBER="${{ steps.change_type.outputs.pr_number }}"
          PR_TITLE="${{ steps.change_type.outputs.pr_title }}"
          MERGE_DATE="${{ steps.change_type.outputs.merge_date }}"
          AUTHOR="${{ github.event.pull_request.user.login }}"
          HTML_URL="${{ github.event.pull_request.html_url }}"

          python3 << PYEOF
          import os

          section = os.environ["SECTION"]
          pr_number = os.environ["PR_NUMBER"]
          pr_title = os.environ["PR_TITLE"]
          merge_date = os.environ["MERGE_DATE"]
          author = os.environ["AUTHOR"]
          html_url = os.environ["HTML_URL"]
          entry = f"- {pr_title} ([#{pr_number}]({html_url})) by @{author} on {merge_date}"

          with open("CHANGELOG.md", "r") as f:
              content = f.read()

          lines = content.split("\n")
          output = []
          found_unreleased = False
          found_section = False
          inserted = False
          unreleased_end = -1

          i = 0
          while i < len(lines):
              line = lines[i]

              if line.strip() == "## [Unreleased]":
                  found_unreleased = True
                  output.append(line)
                  i += 1
                  continue

              # If we hit a new ## and were in Unreleased, insert here if not yet
              if found_unreleased and line.startswith("## ") and line.strip() != "## [Unreleased]":
                  if not inserted:
                      output.append("")
                      output.append(f"### {section}")
                      output.append("")
                      output.append(entry)
                      inserted = True
                  unreleased_end = len(output)
                  output.append(line)
                  i += 1
                  continue

              # If we're in Unreleased and found the section header
              if found_unreleased and not inserted and line.strip() == f"### {section}":
                  found_section = True
                  output.append(line)
                  i += 1

                  # Find the end of this section (next ### or ##)
                  while i < len(lines):
                      next_line = lines[i]
                      if next_line.strip().startswith("### ") or next_line.strip().startswith("## "):
                          if not inserted:
                              output.append("")
                              output.append(entry)
                              inserted = True
                          break
                      output.append(next_line)
                      i += 1
                  i += 1
                  continue

              output.append(line)
              i += 1

          # If section wasn't found, insert before the next ## after [Unreleased]
          if not inserted and unreleased_end > 0:
              output.insert(unreleased_end, "")
              output.insert(unreleased_end + 1, f"### {section}")
              output.insert(unreleased_end + 2, "")
              output.insert(unreleased_end + 3, entry)
              inserted = True
          elif not inserted:
              output.append("")
              output.append(f"### {section}")
              output.append("")
              output.append(entry)

          with open("CHANGELOG.md", "w") as f:
              f.write("\n".join(output))

          print(f"Added entry to section: {section}")
          PYEOF
        env:
          SECTION: ${{ steps.change_type.outputs.section }}
          PR_NUMBER: ${{ steps.change_type.outputs.pr_number }}
          PR_TITLE: ${{ steps.change_type.outputs.pr_title }}
          MERGE_DATE: ${{ steps.change_type.outputs.merge_date }}
          AUTHOR: ${{ github.event.pull_request.user.login }}
          HTML_URL: ${{ github.event.pull_request.html_url }}

      - name: Create PR with Changelog Update
        run: |
          BRANCH="changelog/update-pr-${{ steps.change_type.outputs.pr_number }}"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git checkout -b "$BRANCH"
          git add CHANGELOG.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "docs: update CHANGELOG.md with PR #${{ steps.change_type.outputs.pr_number }}"
          git push origin "$BRANCH"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
