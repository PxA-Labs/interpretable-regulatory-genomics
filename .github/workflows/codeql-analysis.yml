name: "CodeQL Analysis"

on:
  push:
    branches: [ main ]
  pull_request:
    # Only scan pull requests targeting main
    branches: [ main ]
  schedule:
    - cron: '0 12 * * 6' # Run every Saturday at 12:00 UTC

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'python' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    # Initializes the CodeQL tools for scanning.
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v2
      with:
        languages: ${{ matrix.language }}
        # Query suites options: security-extended, security-and-quality
        queries: security-extended,security-and-quality

    # Autobuild attempts to build any compiled languages (not strictly needed for Python but good practice)
    - name: Autobuild
      uses: github/codeql-action/autobuild@v2

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v2
